name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.14
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run Black
        run: uv run black --check .
      - name: Run Flake8
        run: uv run flake8 .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: nautobot
          POSTGRES_DB: nautobot
          POSTGRES_PASSWORD: nautobot
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          uv sync --extra test
          uv pip install nautobot==3.0.11
      - name: Run Tests
        env:
          NAUTOBOT_DB_HOST: localhost
          NAUTOBOT_DB_USER: nautobot
          NAUTOBOT_DB_NAME: nautobot
          NAUTOBOT_DB_PASSWORD: nautobot
          NAUTOBOT_REDIS_HOST: localhost
          NAUTOBOT_INSTALLATION_METRICS_ENABLED: "False"
          DJANGO_SETTINGS_MODULE: nautobot.core.settings
          NAUTOBOT_CONFIG: ${{ github.workspace }}/nautobot_config.py
        run: |
          # Ensure the plugin is installed and discoverable
          uv run nautobot-server test nautobot_topology --noinput

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: cd frontend && npm install
      - name: Run frontend tests
        run: cd frontend && npm test
