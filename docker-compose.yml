version: "3.8"

services:
  db:
    image: postgres:15
    env_file:
      - ".env.cred.example"
      - ".env.local.example"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: "pg_isready --username=$$POSTGRES_USER --dbname=$$POSTGRES_DB"
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: sh -c "redis-server --requirepass $$NAUTOBOT_REDIS_PASSWORD"
    env_file:
      - ".env.cred.example"
      - ".env.local.example"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  nautobot:
    build:
      context: .
      dockerfile: Dockerfile
    image: nautobot-topology:local
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # environment:
    #   - NAUTOBOT_DB_HOST=postgres
    #   - NAUTOBOT_DB_NAME=nautobot
    #   - NAUTOBOT_DB_USER=nautobot
    #   - NAUTOBOT_DB_PASSWORD=nautobot
    #   - NAUTOBOT_REDIS_HOST=redis
    #   - NAUTOBOT_REDIS_PASSWORD=nautobot
    #   - NAUTOBOT_SECRET_KEY=dummy_secret_key_for_testing
    #   - NAUTOBOT_ALLOWED_HOSTS=*
    env_file:
      - ".env.cred.example"
      - ".env.local.example"
    volumes:
      - "./nautobot_topology:/usr/local/lib/python3.14/site-packages/nautobot_topology"
    command: "nautobot-server runserver 0.0.0.0:8080"

  celery:
    image: nautobot-topology:local
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # environment:
    #   - NAUTOBOT_DB_HOST=postgres
    #   - NAUTOBOT_DB_NAME=nautobot
    #   - NAUTOBOT_DB_USER=nautobot
    #   - NAUTOBOT_DB_PASSWORD=nautobot
    #   - NAUTOBOT_REDIS_HOST=redis
    #   - NAUTOBOT_REDIS_PASSWORD=nautobot
    #   - NAUTOBOT_SECRET_KEY=dummy_secret_key_for_testing
    env_file:
      - ".env.cred.example"
      - ".env.local.example"
    volumes:
      - "./nautobot_topology:/usr/local/lib/python3.14/site-packages/nautobot_topology"
    command: "nautobot-server celery worker -l INFO"

volumes:
  pgdata:
